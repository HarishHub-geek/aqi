services:
  # PostgreSQL with PostGIS
  postgres:
    image: postgis/postgis:15-3.4
    container_name: aqi-postgres
    environment:
      POSTGRES_DB: aqi_platform
      POSTGRES_USER: aqi_user
      POSTGRES_PASSWORD: aqi_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U aqi_user -d aqi_platform" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:7-alpine
    container_name: aqi-redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5

  # Backend API
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: aqi-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://aqi_user:aqi_password@postgres:5432/aqi_platform
      - REDIS_URL=redis://redis:6379
      - PYTHONPATH=/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ML Service
  ml:
    build:
      context: .
      dockerfile: apps/ml/Dockerfile
    container_name: aqi-ml
    ports:
      - "8001:8001"
    environment:
      - PYTHONPATH=/app
    depends_on:
      - api
    restart: unless-stopped

  # Frontend
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: aqi-web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://api:8000
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
